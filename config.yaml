alpaca:
  discovery_port: 32227        # UDP broadcast port defined by ALPACA spec
  discovery_timeout: 5         # seconds to wait for discovery responses
  api_version: 1

devices:
  telescope:
    enabled: true
    device_number: 0
  camera:
    enabled: true
    device_number: 0
  focuser:
    enabled: false
    device_number: 0
  filterwheel:
    enabled: false
    device_number: 0

telescope:
  slew_ra: 23.6833             # RA in decimal hours  (example: Andromeda)
  slew_dec: 80.2692            # Dec in decimal degrees
  tracking_rate: 0             # 0=Sidereal, 1=Lunar, 2=Solar, 3=King

camera:
  exposure_duration: 1.0       # seconds
  binning: 1

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

image_watcher:
  enabled: false                  # set true to watch for Seestar FITS files
  watch_path: "/mnt/seestar"      # local mount point of the SMB share
  debounce_delay: 2.0             # seconds to wait after last write before processing

safety:
  enabled: true
  disconnect_timeout: 600       # seconds — park after this long without telescope contact
  heartbeat_interval: 30        # seconds between connection checks
  reconnect_attempts: 3         # retries before declaring connection lost
  reconnect_delay: 10           # seconds between reconnect attempts
  park_at_dawn: true            # park automatically at dawn
  dawn_type: astronomical       # astronomical (-18°), nautical (-12°), civil (-6°)
  observer:
    latitude: 0.0               # decimal degrees N  ← set your location
    longitude: 0.0              # decimal degrees E  (negative = West)
