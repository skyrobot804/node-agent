alpaca:
  discovery_port: 32227
  discovery_timeout: 5
  api_version: 1
  default_server:
    address: 172.22.6.32
    port: 32323
devices:
  telescope:
    enabled: true
    device_number: 0
  camera:
    enabled: true
    device_number: 0
  focuser:
    enabled: false
    device_number: 0
  filterwheel:
    enabled: false
    device_number: 0
  covercalibrator:
    enabled: true
    device_number: 0
telescope:
  slew_ra: 23.6833
  slew_dec: 80.2692
  tracking_rate: 0
camera:
  exposure_duration: 1.0
  binning: 1
logging:
  level: INFO
  format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'
pier_cam:
  enabled: false
  device_index: 0
  sdk_lib: ''
  exposure_ms: 80
  gain: 200
  bin: 2
  target_fps: 10
  jpeg_quality: 75
image_watcher:
  enabled: false
  watch_path: /mnt/seestar
  debounce_delay: 2.0
observatory:
  name: ''
  latitude: null
  longitude: null
  elevation: 0.0
  telescope: ZWO Seestar S50
  instrument: ZWO Seestar S50 IMX462
  observer: ''
photometry:
  enabled: false
  node_id: node_001
  filter_name: CV
  gain: 1.0
  read_noise: 5.0
  target:
    name: ''
    ra_deg: null
    dec_deg: null
  astap_path: astap
  astap_search_radius: 10
  aperture_factor: 2.5
  annulus_inner: 4.0
  annulus_outer: 6.0
  field_radius: 0.5
  mag_limit: 15.0
  min_comparison_stars: 3
  snr_threshold: 20
  max_uncertainty: 0.3
  max_airmass: 3.0
  fits_export:
    enabled: true
    export_dir: fits_export
aavso:
  observer_code: ''
  username: ''
  password: ''
  audit_dir: aavso_submissions
  dry_run: false
  submit_poor_quality: false
  chart_id: ''
safety:
  enabled: true
  disconnect_timeout: 600
  heartbeat_interval: 30
  reconnect_attempts: 3
  reconnect_delay: 10
  park_at_dawn: true
  dawn_type: astronomical
  observer:
    latitude: 0.0
    longitude: 0.0
