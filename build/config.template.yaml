# Boundless Skies Node Agent — configuration
# Generated by the installer.  Edit via the dashboard at http://localhost:5173
# or by opening this file in a text editor.

alpaca:
  discovery_port: 32227
  discovery_timeout: 5
  api_version: 1
  default_server:
    address: ''          # left blank: auto-discovered from Seestar Station Mode
    port: 32323

devices:
  telescope:
    enabled: true
    device_number: 0
  camera:
    enabled: true
    device_number: 0
  focuser:
    enabled: false
    device_number: 0
  filterwheel:
    enabled: false
    device_number: 0
  covercalibrator:
    enabled: true
    device_number: 0

camera:
  exposure_duration: 10.0
  binning: 1

observatory:
  name: ''
  latitude: null          # auto-detected from IP on first cloud registration
  longitude: null
  elevation: 0.0
  telescope: ZWO Seestar S50
  instrument: ZWO Seestar S50 IMX462
  observer: ''

photometry:
  enabled: true
  node_id: ''             # set automatically after cloud registration
  filter_name: CV
  gain: 1.0
  read_noise: 5.0
  target:
    name: ''
    ra_deg: null
    dec_deg: null
  astap_path: astap       # must be installed separately; see boundlessskies.org/setup
  astap_search_radius: 10
  aperture_factor: 2.5
  annulus_inner: 4.0
  annulus_outer: 6.0
  field_radius: 0.5
  mag_limit: 15.0
  min_comparison_stars: 3
  snr_threshold: 20
  max_uncertainty: 0.3
  max_airmass: 3.0
  fits_export:
    enabled: true
    export_dir: fits_export

aavso:
  observer_code: ''
  username: ''
  password: ''
  audit_dir: aavso_submissions
  dry_run: true
  submit_poor_quality: false
  chart_id: ''

cloud:
  enabled: true
  url: 'https://cloud.boundlessskies.org'
  activation_code: 'ACTIVATION_CODE_PLACEHOLDER'
  node_id: ''             # set automatically after first registration
  api_key: ''             # set automatically after first registration
  heartbeat_interval: 60
  plan_poll_interval: 300
  auto_run_plans: true    # execute cloud observation plans automatically
  upload_images: false

image_watcher:
  enabled: true
  watch_path: ''          # set automatically when Seestar is connected
  debounce_delay: 2.0

safety:
  enabled: true
  disconnect_timeout: 600
  heartbeat_interval: 30
  reconnect_attempts: 3
  reconnect_delay: 10
  park_at_dawn: true
  dawn_type: astronomical
  observer:
    latitude: 0.0
    longitude: 0.0

logging:
  level: INFO
  format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'
